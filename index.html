<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyBird PRO FIX</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #e6f7ff;
}

canvas {
  background: linear-gradient(skyblue, white);
  display: block;
  margin: auto;
  border: 2px solid #333;
}

button {
  padding: 10px 15px;
  margin: 10px;
  cursor: pointer;
}

#info {
  font-size: 18px;
}
</style>
</head>

<body>

<h2>🐦 SkyBird FIXED</h2>

<button onclick="startGame()">START GAME</button>

<canvas id="game" width="400" height="600"></canvas>

<p id="info"></p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird, pipes, score, gameRunning = false;
let highScore = localStorage.getItem("highScore") || 0;

let wing = 0;

// 🎮 بداية اللعبة
function startGame() {
  bird = {
    x: 80,
    y: 200,
    velocity: 0,
    gravity: 0.6,
    lift: -10,
    radius: 18
  };

  pipes = [];
  score = 0;
  gameRunning = true;

  document.getElementById("info").innerText = "";

  loop();
}

// ⬆️ القفز
document.addEventListener("keydown", flap);
canvas.addEventListener("touchstart", flap);

function flap() {
  if (gameRunning) bird.velocity = bird.lift;
}

// 🐦 رسم الطائر (الشي الأساسي)
function drawBird() {

  // جسم الطائر
  ctx.fillStyle = "#1e90ff";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
  ctx.fill();

  // عين
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(bird.x + 6, bird.y - 4, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(bird.x + 7, bird.y - 4, 2, 0, Math.PI * 2);
  ctx.fill();

  // 🪽 جناح متحرك (رفرفة حقيقية)
  ctx.fillStyle = "#0d6efd";

  ctx.beginPath();
  if (wing === 0) {
    ctx.moveTo(bird.x - 10, bird.y);
    ctx.lineTo(bird.x - 25, bird.y + 10);
    ctx.lineTo(bird.x - 20, bird.y - 10);
  } else {
    ctx.moveTo(bird.x - 10, bird.y);
    ctx.lineTo(bird.x - 25, bird.y - 10);
    ctx.lineTo(bird.x - 20, bird.y + 10);
  }
  ctx.fill();

  wing = wing === 0 ? 1 : 0;
}

// 🚧 الأنابيب
function drawPipes() {
  ctx.fillStyle = "green";

  pipes.forEach(pipe => {
    pipe.x -= 2;

    ctx.fillRect(pipe.x, 0, 60, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, 60, 600);

    // تصادم
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + 60 &&
      (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.bottom)
    ) {
      endGame();
    }

    // سكور
    if (!pipe.passed && pipe.x + 60 < bird.x) {
      score++;
      pipe.passed = true;
    }
  });

  pipes = pipes.filter(p => p.x + 60 > 0);

  if (pipes.length === 0 || pipes[pipes.length - 1].x < 180) {
    let top = Math.random() * 300 + 50;

    pipes.push({
      x: 400,
      top: top,
      bottom: top + 130,
      passed: false
    });
  }
}

// 📊 السكور
function drawScore() {
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 30);
  ctx.fillText("High: " + highScore, 10, 55);
}

// 🔄 الفيزياء
function update() {
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  if (bird.y > 580 || bird.y < 0) {
    endGame();
  }
}

// 💥 نهاية اللعبة
function endGame() {
  gameRunning = false;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }

  document.getElementById("info").innerText =
    "💥 Game Over | Score: " + score + " | High: " + highScore;
}

// 🎮 الحلقة
function loop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, 400, 600);

  update();
  drawBird();   // 👈 هذا هو المهم
  drawPipes();
  drawScore();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
